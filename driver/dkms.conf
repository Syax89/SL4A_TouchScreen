# DKMS configuration for the SL4A_TouchScreen driver (spi-amd + spi-hid).
#
# Rebuilds spi-amd.ko/spi-hid.ko automatically against every installed kernel,
# so the driver survives kernel updates without manual intervention. See
# tools/install.sh, which copies this whole directory to
# /usr/src/${PACKAGE_NAME}-${PACKAGE_VERSION}/ and drives dkms add/build/install.
#
# IMPORTANT: PACKAGE_VERSION (see ../VERSION) must never contain a literal "-".
# Arch/CachyOS's own pacman dkms hook (/usr/share/libalpm/scripts/dkms) re-derives
# module name + version from the /usr/src/<name>-<version> directory name using a
# greedy regex `([^/]+)-([^/]+)` that splits on the *last* hyphen, not on the
# boundary dkms add/install were actually given. A version like "1.0.0-beta1"
# gets mis-split into name="sl4a-touch-1.0.0", version="beta1" on every kernel
# upgrade, silently re-registering the module under the wrong name and failing
# to build for the new kernel (found live on 2026-07-08 after a CachyOS update:
# `dkms status` showed `sl4a-touch-1.0.0/beta1` instead of `sl4a-touch/1.0.0-beta1`).
# Use "~" or no separator instead (e.g. "1.0.0~beta1"), never "-".

PACKAGE_NAME="sl4a-touch"
PACKAGE_VERSION="#VERSION#"

BUILT_MODULE_NAME[0]="spi-amd"
DEST_MODULE_LOCATION[0]="/updates/dkms"

BUILT_MODULE_NAME[1]="spi-hid"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# LLVM=1 only when the TARGET kernel was itself built with clang (e.g. CachyOS) — its
# Makefile.build emits clang-only flags (-mllvm, etc.) in that case. A kernel built with
# gcc (e.g. vanilla Arch's linux package) emits gcc-only flags (-mindirect-branch=thunk-extern,
# -mrecord-mcount, -fconserve-stack, ...) that clang rejects outright. Hardcoding LLVM=1
# unconditionally broke the build on a plain Arch kernel installed alongside CachyOS ones
# (found live on 2026-07-08) — detect per-kernel from its own .config instead of assuming.
MAKE[0]="make $(grep -q '^CONFIG_CC_IS_CLANG=y' /lib/modules/${kernelver}/build/.config 2>/dev/null && echo LLVM=1) -C /lib/modules/${kernelver}/build M=/var/lib/dkms/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
# No CLEAN directive: it's unconditionally flagged deprecated by dkms 3.4.1 regardless of
# syntax (checks `${#CLEAN[@]}` directly) and isn't needed for our add/build/install flow —
# `dkms remove` deletes the whole per-version tree instead of relying on `make clean`.

AUTOINSTALL="yes"
